<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="roundedSquare">
      <rect x="0" y="0" width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>
  
  <g clip-path="url(#roundedSquare)">
    <rect width="512" height="512" fill="#0b1a30"/>

    <!-- L-shaped routing path -->
    <path d="M 185 128 L 185 348 Q 185 372 209 372 L 365 372" fill="none" stroke="#00e5a0" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Arrow head -->
    <path d="M 340 344 L 372 372 L 340 400" fill="none" stroke="#00e5a0" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Origin node -->
    <circle cx="185" cy="128" r="10" fill="#00e5a0"/>
    
    <!-- Proxy bend node -->
    <circle cx="185" cy="360" r="14" fill="#00e5a0"/>
    <circle cx="185" cy="360" r="8" fill="#0b1a30"/>
    <circle cx="185" cy="360" r="4" fill="#00e5a0"/>
    
    <!-- Destination node -->
    <circle cx="372" cy="372" r="10" fill="#00b4d8"/>
  </g>
</svg>
