    </g>
    <ellipse cx="256" cy="256" rx="120" ry="120" fill="#06d6a0" opacity="0.06" filter="url(#softGlow)"/>
    <ellipse cx="256" cy="256" rx="80" ry="80" fill="#f4a261" opacity="0.04" filter="url(#softGlow)"/>
    <path d="M 130 160 C 130 160, 180 156, 220 180 C 260 204, 240 256, 280 280 C 320 304, 370 260, 370 260" fill="none" stroke="#06d6a0" stroke-width="28" stroke-linecap="round" opacity="0.15" filter="url(#softGlow)"/>
    <path d="M 160 370 C 160 370, 156 320, 180 280 C 204 240, 256 260, 280 220 C 304 180, 260 130, 260 130" fill="none" stroke="#f4a261" stroke-width="28" stroke-linecap="round" opacity="0.15" filter="url(#softGlow)"/>
    <path d="M 130 160 C 130 160, 180 156, 220 180 C 245 193, 248 215, 252 235" fill="none" stroke="url(#pathGrad1)" stroke-width="22" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M 268 285 C 290 305, 320 300, 340 285 C 360 270, 370 260, 370 260" fill="none" stroke="url(#pathGrad1)" stroke-width="22" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M 160 370 C 160 370, 156 320, 180 280 C 204 240, 256 260, 280 220 C 304 180, 260 130, 260 130" fill="none" stroke="url(#pathGrad2)" stroke-width="22" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M 252 235 C 256 255, 260 270, 268 285" fill="none" stroke="url(#pathGrad1)" stroke-width="22" stroke-linecap="round" filter="url(#glow)"/>
